services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tiny-text2img-diffusion:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      HF_HOME: /workspace/.cache/huggingface
      TRANSFORMERS_CACHE: /workspace/.cache/huggingface
      PYTHONUNBUFFERED: "1"
    command: python -m unittest
  web:
    image: tiny-text2img-diffusion:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      HF_HOME: /workspace/.cache/huggingface
      TRANSFORMERS_CACHE: /workspace/.cache/huggingface
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    command: python -m uvicorn src.web.app:app --host 0.0.0.0 --port 8000
