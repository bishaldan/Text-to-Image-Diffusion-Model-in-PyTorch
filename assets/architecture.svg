<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Tiny diffusion model architecture</title>
  <desc id="desc">Architecture diagram showing dataset, text encoder, timestep embedding, conditioned U-Net, diffusion loss, and outputs.</desc>
  <rect width="980" height="420" fill="#f7f5ef"/>
  <rect x="40" y="120" width="180" height="90" rx="18" fill="#ecf2ff" stroke="#3057a6" stroke-width="3"/>
  <text x="130" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#17325c">Synthetic</text>
  <text x="130" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#17325c">Dataset</text>
  <rect x="270" y="40" width="190" height="90" rx="18" fill="#fff4db" stroke="#b17a00" stroke-width="3"/>
  <text x="365" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#6d4700">Prompt</text>
  <text x="365" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#6d4700">Tokenizer + BERT</text>
  <rect x="270" y="250" width="190" height="90" rx="18" fill="#e7f7ea" stroke="#2f7d45" stroke-width="3"/>
  <text x="365" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#1d5c31">Timestep</text>
  <text x="365" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#1d5c31">Embedding</text>
  <rect x="520" y="120" width="220" height="120" rx="18" fill="#fdecef" stroke="#b24d61" stroke-width="3"/>
  <text x="630" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#6f2435">Conditioned U-Net</text>
  <text x="630" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6f2435">Predicts the noise</text>
  <text x="630" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6f2435">added to the image</text>
  <rect x="790" y="120" width="150" height="90" rx="18" fill="#efe9ff" stroke="#6d4cb3" stroke-width="3"/>
  <text x="865" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#45257d">Diffusion</text>
  <text x="865" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#45257d">Loss</text>
  <path d="M220 165 H250" stroke="#3057a6" stroke-width="4" fill="none"/>
  <polygon points="250,165 238,158 238,172" fill="#3057a6"/>
  <path d="M460 85 C505 85 505 150 520 150" stroke="#b17a00" stroke-width="4" fill="none"/>
  <polygon points="520,150 508,143 508,157" fill="#b17a00"/>
  <path d="M460 295 C505 295 505 210 520 210" stroke="#2f7d45" stroke-width="4" fill="none"/>
  <polygon points="520,210 508,203 508,217" fill="#2f7d45"/>
  <path d="M740 165 H770" stroke="#b24d61" stroke-width="4" fill="none"/>
  <polygon points="770,165 758,158 758,172" fill="#b24d61"/>
  <text x="490" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#3c3b37">Train on noisy images + prompt embeddings, then sample by reversing the noise process.</text>
</svg>

